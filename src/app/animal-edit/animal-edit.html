<div class="edit-wrapper">
  @if (loading()) {
    <p>Lade Daten...</p>
  }

  @if (!loading()) {
    <div class="edit-card">
      <h2>✏️ Tier bearbeiten</h2>

      <div class="form-group">
        <label>Name</label>
        <input [value]="name()" (input)="name.set($any($event.target).value)" />
      </div>

      <div class="form-group">
        <label>Species</label>
        <input [value]="species()" (input)="species.set($any($event.target).value)" />
      </div>

      <div class="form-group">
        <label>Status</label>
        <select [value]="status()" (change)="status.set($any($event.target).value)">
          <option value="AVAILABLE">AVAILABLE</option>
          <option value="RESERVED">RESERVED</option>
          <option value="ADOPTED">ADOPTED</option>
        </select>
      </div>

      <div class="form-group">
        <label>Beschreibung</label>
        <textarea
          [value]="description()"
          (input)="description.set($any($event.target).value)"
        ></textarea>
      </div>

      <div class="actions">
        <button (click)="save()" class="save-btn">💾 Speichern</button>
        <button (click)="cancel()" class="cancel-btn">Abbrechen</button>
      </div>
    </div>
  }
</div>
