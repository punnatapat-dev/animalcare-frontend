<div
  style="
    background: #eef2f3;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 30px;
    border: 1px solid #ccc;
  "
>
  <h3 style="margin-top: 0">
    {{ editingAnimalId() ? '✏️ Tier bearbeiten' : '➕ Neues Tier hinzufügen' }}
  </h3>

  <div style="display: flex; gap: 10px; align-items: flex-start; flex-wrap: wrap;">
    
    <div style="display: flex; flex-direction: column; flex: 1; min-width: 200px;">
      <input
        [value]="newAnimalName()"
        (input)="newAnimalName.set($any($event.target).value)"
        placeholder="Name (z.B. Luna)"
        [style.border]="submitAttempted && nameError() ? '2px solid #dc3545' : '1px solid #999'"
        style="padding: 8px; border-radius: 5px; outline: none; height: 38px; box-sizing: border-box;"
      />
      @if (submitAttempted && nameError()) {
        <small style="color: #dc3545; font-weight: bold; margin-top: 4px;">
          ⚠️ {{ nameError() }}
        </small>
      }
    </div>

    <div style="display: flex; flex-direction: column; flex: 1; min-width: 150px;">
      <input
        [value]="newAnimalSpecies()"
        (input)="newAnimalSpecies.set($any($event.target).value)"
        placeholder="Art (z.B. DOG)"
        style="padding: 8px; border-radius: 5px; border: 1px solid #999; height: 38px; box-sizing: border-box;"
      />
    </div>

    <input type="file" (change)="onFileSelected($event)" style="flex: 1; min-width: 150px; padding-top: 5px;" />

    <div style="display: flex; gap: 8px;">
      <button
        (click)="handleFormSubmit()"
        [style.background]="editingAnimalId() ? '#ffc107' : '#28a745'"
        style="
          padding: 8px 20px; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; height: 38px;
        "
      >
        {{ editingAnimalId() ? 'Aktualisieren' : 'Speichern' }}
      </button>

      @if (editingAnimalId()) {
        <button (click)="cancelEdit()" style="padding: 8px 20px; background: #6c757d; color: white; border: none; border-radius: 5px; cursor: pointer; height: 38px;">
          Abbrechen
        </button>
      }
    </div>
  </div>
</div>
